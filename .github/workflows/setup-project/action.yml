name: "Setup Playwright Project"
description: "Set up Node.js, install dependencies and Playwright browsers"

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: 22
        cache: 'yarn'

    - name: Install dependencies
      shell: bash
      run: yarn install --frozen-lockfile

    - name: Install Playwright browsers
      shell: bash
      run: yarn playwright install --with-deps
